<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liona Jewels</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <div class="logo">LIONA JEWELS</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Productos</a>
    <a href="contact.html">Contacto</a>
  </nav>
  <div class="cart-btn" onclick="toggleCart()">

  <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
    <path d="M3 5H5L7 15H18L21 8H8"
      stroke="black"
      stroke-width="1.8"
      stroke-linecap="round"
      stroke-linejoin="round"/>

    <circle cx="9" cy="20" r="1.5" fill="black"/>
    <circle cx="18" cy="20" r="1.5" fill="black"/>
  </svg>

  <span id="count">0</span>

</div>
</header>

<!-- HERO -->
<section class="hero reveal">
  <h1>LIONA JEWELS</h1>
  <p>Joyas hipoalergénicas hechas a mano</p>
</section>

<!-- CARRUSEL -->
<section class="carousel-section reveal">
  <h2>Destacados</h2>

  <div class="carousel">

    <div class="carousel-card">
      <img src="img1.jpg" alt="Pendiente minimal">
      <p>Pendiente minimal</p>
    </div>

    <div class="carousel-card">
      <img src="img2.jpg" alt="Pendiente perla">
      <p>Pendiente perla</p>
    </div>

    <div class="carousel-card">
      <img src="img3.jpg" alt="Aros gold">
      <p>Aros gold</p>
    </div>

  </div>
</section>

<!-- CTA -->
<section class="cta reveal">
  <a href="shop.html" class="btn">Ver colección</a>
</section>
<div id="overlay" class="cart-overlay" onclick="toggleCart()"></div>

<div id="cart" class="cart-panel">

  <h2>Tu carrito</h2>

  <div id="cartItems"></div>

  <div class="cart-footer">
    <p>Total: <span id="total">0</span>€</p>

    <button onclick="goCheckout()">
      Finalizar pedido
    </button>
  </div>

</div>
<!-- APP CORE (fav + cart + animaciones + admin + productos dinámicos) -->
<script src="app.js"></script>

</body>
</html>
