<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shop - Liona Jewels</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>

 <a class="logo" href="index.html">
  <img src="logo.png" alt="Liona Jewels">
</a>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Productos</a>
    <a href="contact.html">Contacto</a>
  </nav>

  <!-- CARRO PREMIUM SVG -->
  <div class="cart-btn" onclick="toggleCart()">

    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M3 5H5L7 15H18L21 8H8"
        stroke="black"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"/>

      <circle cx="9" cy="20" r="1.5" fill="black"/>
      <circle cx="18" cy="20" r="1.5" fill="black"/>
    </svg>

    <span id="count">0</span>

  </div>

</header>

<!-- FILTERS -->
<div class="filters reveal">
  <button onclick="filter('all')">Todo</button>
  <button onclick="filter('sencillos')">Sencillos</button>
  <button onclick="filter('aros')">Aros</button>
  <button onclick="filter('largos')">Largos</button>
</div>

<!-- PRODUCTS -->
<section class="products">

  <!-- MINIMAL -->
  <div class="card reveal"
    data-cat="sencillos"
    onclick="location.href='product.html?name=Minimal&price=12&img=img1.jpg'">

    <img src="img1.jpg">
    <h3>Pendiente minimal</h3>
    <p>12€</p>

    <button onclick="event.stopPropagation(); add('Minimal',12,'img1.jpg')">
      Añadir
    </button>

  <button class="fav"
  data-name="Minimal"
  onclick="event.stopPropagation(); toggleFav('Minimal')">

  <svg class="fav-icon" viewBox="0 0 24 24" fill="none">
    <path
      d="M12 21s-7-4.6-9.5-7.5C-0.5 10 1.5 5.5 5.8 5.2
         8 5 9.5 6 12 8c2.5-2 4-3 6.2-2.8
         4.3.3 6.3 4.8 3.2 8.3C19 16.8 12 21 12 21z"
      stroke="currentColor"
      stroke-width="1.6"
      stroke-linejoin="round"
    />
  </svg>

</button>
  </div>

  <!-- PERLA -->
  <div class="card reveal"
    data-cat="sencillos"
    onclick="location.href='product.html?name=Perla&price=14&img=img2.jpg'">

    <img src="img2.jpg">
    <h3>Pendiente perla</h3>
    <p>14€</p>

    <button onclick="event.stopPropagation(); add('Perla',14,'img2.jpg')">
      Añadir
    </button>

   <button class="fav"
  data-name="Minimal"
  onclick="event.stopPropagation(); toggleFav('Minimal')">

  <svg class="fav-icon" viewBox="0 0 24 24" fill="none">
    <path
      d="M12 21s-7-4.6-9.5-7.5C-0.5 10 1.5 5.5 5.8 5.2
         8 5 9.5 6 12 8c2.5-2 4-3 6.2-2.8
         4.3.3 6.3 4.8 3.2 8.3C19 16.8 12 21 12 21z"
      stroke="currentColor"
      stroke-width="1.6"
      stroke-linejoin="round"
    />
  </svg>

</button>
  </div>

  <!-- AROS -->
  <div class="card reveal"
    data-cat="aros"
    onclick="location.href='product.html?name=Aros%20gold&price=16&img=img3.jpg'">

    <img src="img3.jpg">
    <h3>Aros gold</h3>
    <p>16€</p>

    <button onclick="event.stopPropagation(); add('Aros',16,'img3.jpg')">
      Añadir
    </button>

  <button class="fav"
  data-name="Minimal"
  onclick="event.stopPropagation(); toggleFav('Minimal')">

  <svg class="fav-icon" viewBox="0 0 24 24" fill="none">
    <path
      d="M12 21s-7-4.6-9.5-7.5C-0.5 10 1.5 5.5 5.8 5.2
         8 5 9.5 6 12 8c2.5-2 4-3 6.2-2.8
         4.3.3 6.3 4.8 3.2 8.3C19 16.8 12 21 12 21z"
      stroke="currentColor"
      stroke-width="1.6"
      stroke-linejoin="round"
    />
  </svg>

</button>

  </div>

</section>

 
 <!-- FOOTER -->
 <footer class="footer-lux">

  <!-- LEFT -->
  <div class="footer-lux-left">
    <img src="logo.png" alt="Liona Jewels" class="footer-lux-logo">

    <div>
      <h3>LIONA JEWELS</h3>
      <span class="footer-tag">Handmade Jewelry</span>
    </div>
  </div>

  <!-- CENTER -->
  <div class="footer-lux-center">
    <p>
      Joyas hipoalergénicas hechas a mano<br>
      diseñadas para acompañarte cada día
    </p>
  </div>

  <!-- RIGHT -->
  <div class="footer-lux-right">

    <a href="https://instagram.com/lionajewels" target="_blank" class="lux-link">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="18" height="18" rx="5"
          stroke="currentColor" stroke-width="1.4"/>
        <circle cx="12" cy="12" r="4"
          stroke="currentColor" stroke-width="1.4"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
      </svg>
      <span>@lionajewels</span>
    </a>

    <a href="mailto:lionajewels@gmail.com" class="lux-link">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="3" y="5" width="18" height="14" rx="2"
          stroke="currentColor" stroke-width="1.4"/>
        <path d="M4 7L12 13L20 7"
          stroke="currentColor"
          stroke-width="1.4"
          stroke-linecap="round"
          stroke-linejoin="round"/>
      </svg>
      <span>lionajewels@gmail.com</span>
    </a>

  </div>

</footer>

<!-- CART -->
<div id="overlay" class="cart-overlay" onclick="toggleCart()"></div>

<div id="cart" class="cart-panel">

  <h2>Tu carrito</h2>

  <div id="cartItems"></div>

  <div class="cart-footer">

    <p>Total: <span id="total">0</span>€</p>

    <button onclick="goCheckout()">
      Finalizar pedido
    </button>

  </div>

</div>

<!-- APP -->
<script src="app.js"></script>

</body>
</html>
