<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout - Liona Jewels</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>

  <a class="logo" href="index.html">
    <img src="logo.png" alt="Liona Jewels">
  </a>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Productos</a>
    <a href="contact.html">Contacto</a>
  </nav>

  <div class="cart-btn" onclick="toggleCart()">

    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M3 5H5L7 15H18L21 8H8"
        stroke="black"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"/>

      <circle cx="9" cy="20" r="1.5" fill="black"/>
      <circle cx="18" cy="20" r="1.5" fill="black"/>
    </svg>

    <span id="count">0</span>

  </div>

</header>


<section class="checkout reveal">

    <h1>Finalizar pedido</h1>

    <!-- RESUMEN -->
    <div class="checkout-summary">

        <h2>Tu pedido</h2>

        <div id="orderSummary"></div>

        <div class="checkout-total">
            <span>Total</span>
            <strong id="orderTotal">0€</strong>
        </div>

    </div>


    <!-- FORMULARIO -->

    <form id="checkoutForm">

        <h2>Información de envío</h2>

        <input
            type="text"
            id="nombre"
            name="nombre"
            placeholder="Nombre completo"
            required
        >

        <input
            type="email"
            id="email"
            name="email"
            placeholder="Correo electrónico"
            required
        >

        <input
            type="text"
            id="direccion"
            name="direccion"
            placeholder="Dirección"
            required
        >

        <div class="checkout-row">

            <input
                type="text"
                id="cp"
                name="cp"
                placeholder="Código postal"
                required
            >

            <input
                type="text"
                id="ciudad"
                name="ciudad"
                placeholder="Ciudad"
                required
            >

        </div>

        <input
            type="text"
            id="provincia"
            name="provincia"
            placeholder="Provincia"
            required
        >

        <textarea
            id="notas"
            name="notas"
            placeholder="Observaciones (opcional)"
        ></textarea>

        <button type="submit" class="btn">
            Confirmar pedido
        </button>

    </form>

</section>


<script src="app.js"></script>



</body>
</html>
