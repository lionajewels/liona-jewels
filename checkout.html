<link rel="stylesheet" href="styles.css">

<h1>Checkout</h1>
<p class="notice">
  Esta pagina prepara un resumen del pedido. Todavia no procesa pagos ni envia el pedido automaticamente.
</p>

<div id="summary"></div>
<p>Total: <span id="total">0</span>€</p>

<input id="name" placeholder="Nombre">
<input id="email" placeholder="Email">
<input id="address" placeholder="Dirección">

<button onclick="finish()">Confirmar pedido</button>

<script src="app.js"></script>

<script>
const checkoutCart = JSON.parse(localStorage.getItem("cart")) || [];
const summary = document.getElementById("summary");

let total = 0;

checkoutCart.forEach(i=>{
  const row = document.createElement("div");
  const price = Number(i.price) || 0;

  row.textContent = `${String(i.name || "")} ${price}€`;
  summary.appendChild(row);
  total += price;
});

document.getElementById("total").innerText = total;

function finish(){
  alert("Resumen guardado. Contactaremos contigo para finalizar el pedido 💎");
  localStorage.removeItem("cart");
  window.location.href = "index.html";
}
</script>
