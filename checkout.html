<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout - Liona Jewels</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <a class="logo" href="index.html">
  <img src="logo.png" alt="Liona Jewels">
</a>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Productos</a>
    <a href="contact.html">Contacto</a>
  </nav>
  <div class="cart-btn" onclick="toggleCart()">

  <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
    <path d="M3 5H5L7 15H18L21 8H8"
      stroke="black"
      stroke-width="1.8"
      stroke-linecap="round"
      stroke-linejoin="round"/>

    <circle cx="9" cy="20" r="1.5" fill="black"/>
    <circle cx="18" cy="20" r="1.5" fill="black"/>
  </svg>

  <span id="count">0</span>

</div>
</header>

<section class="checkout">

  <h1>Finalizar pedido</h1>

  <!-- RESUMEN CARRITO -->
  <div id="orderSummary"></div>

  <!-- FORMULARIO -->
  <form action="https://formsubmit.co/lionajewels@gmail.com" method="POST">

    <input type="hidden" name="_subject" value="💎 Nuevo pedido Liona Jewels">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="box">

    <input type="hidden" name="pedido" id="pedidoInput">
    <input type="hidden" name="total" id="totalInput">
    <input type="hidden" name="articulos" id="articulosInput">

    <input type="text" name="nombre" placeholder="Nombre completo" required>

    <input type="email" name="email" placeholder="Email" required>

    <input type="text" name="direccion" placeholder="Dirección de envío" required>

    <button type="submit">
      Confirmar pedido
    </button>

  </form>

</section>

<script src="app.js"></script>

<script>
  
document.addEventListener("DOMContentLoaded", () => {

  const cart = JSON.parse(localStorage.getItem("cart")) || [];

  const summary = document.getElementById("orderSummary");
  const pedidoInput = document.getElementById("pedidoInput");

  let total = 0;
  

  let html = `
  <div style="font-family:Arial;padding:20px;">
    <h2 style="display:flex;align-items:center;gap:10px;">

  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
    <path
      d="M6 4H18L22 9L12 20L2 9L6 4Z"
      stroke="#b68c5a"
      stroke-width="1.4"
      stroke-linejoin="round"
    />
    <path
      d="M6 4L12 9L18 4"
      stroke="#b68c5a"
      stroke-width="1.4"
    />
    <path
      d="M2 9H22"
      stroke="#b68c5a"
      stroke-width="1.4"
    />
  </svg>

  Liona Jewels - Pedido

</h2>

    <table style="width:100%;border-collapse:collapse;margin-top:20px;">
  `;

  cart.forEach(item => {

    const name = item.name || "";
    const price = Number(item.price) || 0;
    const img = item.img || "";

    total += price;

    html += `
      <tr style="border-bottom:1px solid #eee;">
        <td style="padding:10px;width:80px;">
          <img src="${img}" width="60" style="border-radius:8px;">
        </td>

        <td style="padding:10px;">
          <strong>${name}</strong><br>
          <span>${price}€</span>
        </td>
      </tr>
    `;
  });

  html += `
    </table>

    <h3 style="margin-top:20px;">Total: ${total}€</h3>
  </div>
  `;

  summary.innerHTML = html;
  let pedidoTexto = "";

cart.forEach(item => {
  pedidoTexto += `
Producto: ${item.name}
Precio: ${item.price}€

`;
});

pedidoTexto += `Total: ${total}€`;

pedidoInput.value = pedidoTexto;
  document.getElementById("totalInput").value = total + "€";
  document.getElementById("articulosInput").value = cart.length;

});
</script>
</body>
</html>
