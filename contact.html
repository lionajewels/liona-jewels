<body>

<header>
 <a class="logo" href="index.html">
  <img src="logo.png" alt="Liona Jewels">
</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Productos</a>
    <a href="contact.html">Contacto</a>
  </nav>

</header>

<!-- CONTACTO -->
<section class="contact reveal">

  <h2>Contacto</h2>

  <div class="contact-lux">

    <!-- LEFT (LOGO) -->
    <div class="contact-left">
      <img src="logo.png" class="contact-logo" alt="Liona Jewels">

      <div>
        <h3>LIONA JEWELS</h3>
        <span>Handmade Jewelry</span>
      </div>
    </div>

    <!-- CENTER -->
    <div class="contact-center">
      <p>
        Escríbenos para dudas, pedidos personalizados<br>
        o colaboraciones.
      </p>
    </div>

    <!-- RIGHT -->
    <div class="contact-right">

      <a href="mailto:lionajewels@gmail.com" class="contact-link">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="3" y="5" width="18" height="14" rx="2"
            stroke="currentColor" stroke-width="1.5"/>
          <path d="M4 7L12 13L20 7"
            stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span>Email</span>
      </a>

      <a href="https://instagram.com/lionajewels" target="_blank" class="contact-link">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="5"
            stroke="currentColor" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="4"
            stroke="currentColor" stroke-width="1.5"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
        </svg>
        <span>@lionajewels</span>
      </a>

    </div>

  </div>

</section>

<!-- APP CORE -->
<script src="app.js"></script>
